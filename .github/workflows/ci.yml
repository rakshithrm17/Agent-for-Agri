name: CI — Lint, Type Check & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  # Minimal env for CI — no real API keys needed for unit tests
  DATABASE_URL: "sqlite:///./ci_test.db"
  APP_ENV: "testing"
  LOG_LEVEL: "WARNING"
  LOG_DIR: "crop_agent/logs"
  MANDYA_LATITUDE: "12.5234"
  MANDYA_LONGITUDE: "76.8961"
  DEFAULT_DISTRICT: "Mandya"
  DEFAULT_STATE: "Karnataka"
  OPEN_METEO_BASE_URL: "https://api.open-meteo.com/v1/forecast"
  OPEN_METEO_ARCHIVE_URL: "https://archive-api.open-meteo.com/v1/archive"
  NASA_POWER_BASE_URL: "https://power.larc.nasa.gov/api/temporal/daily/point"
  SOILGRIDS_BASE_URL: "https://rest.soilgrids.org/soilgrids/v2.0/properties/query"
  AGMARKNET_API_KEY: "ci_placeholder"
  AGMARKNET_BASE_URL: "https://api.data.gov.in/resource/35985678-0d79-46b4-9ed6-6f13308a1d24"
  IMD_RSS_URL: "https://mausam.imd.gov.in/rss"
  DD_KISAN_RSS_URL: "https://ddkisan.gov.in/rss"
  NIGHT_AGENT_HOUR: "1"
  NIGHT_AGENT_MINUTE: "0"
  MONTHLY_RETRAIN_HOUR: "3"
  MONTHLY_RETRAIN_MINUTE: "0"
  MODELS_DIR: "crop_agent/models"
  DASHBOARD_PAGE_TITLE: "Crop Intelligence Agent — CI"
  DASHBOARD_HOST: "localhost"
  DASHBOARD_PORT: "8501"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check crop_agent/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install all dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy crop_agent/

  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install all dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: |
          mkdir -p crop_agent/logs
          mkdir -p crop_agent/models

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  # Summary job — branch protection can require this one
  ci-pass:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: All checks passed ✅
        run: echo "All CI checks passed!"
