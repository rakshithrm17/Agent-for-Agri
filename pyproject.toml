[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".venv",
    ".git",
    "__pycache__",
    "alembic",
    "crop_agent/models",
    "crop_agent/logs",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "D", "UP", "B", "C4", "SIM"]
ignore = [
    "D100",  # Missing docstring in public module
    "D104",  # Missing docstring in public package
    "D203",  # 1 blank line required before class docstring (conflicts with D211)
    "D213",  # Multi-line docstring summary on second line (conflicts with D212)
    "E501",  # Line too long
    "D205",  # 1 blank line required between summary line and description
    "D401",  # First line of docstring should be in imperative mood
]

[tool.ruff.lint.per-file-ignores]
"crop_agent/tests/*" = ["D"]  # Relax docstring rules for tests


[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = [
    "crop_agent/models/",
    "crop_agent/logs/",
    ".venv/",
    "alembic/",
]

[tool.pytest.ini_options]
testpaths = ["crop_agent/tests"]
addopts = "--cov=crop_agent --cov-report=term-missing --cov-fail-under=10 -v"

[tool.coverage.run]
source = ["crop_agent"]
omit = [
    "crop_agent/tests/*",
    "crop_agent/logs/*",
    "crop_agent/models/*",
    ".venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
